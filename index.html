<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billions Network AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="bot-info">
                <div class="bot-avatar"><i class="fas fa-robot"></i></div>
                <div>
                    <h2>Smart Assistant</h2>
                    <span class="status">Online Now</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages">
            <!-- Messages will appear here -->
            <div class="message bot-message">
                <div class="message-content">Hello! How can I help you today? 😊</div>
            </div>
        </div>

        <div class="loading-indicator" id="loading" style="display: none;">
            <span>Thinking</span><span class="dots">...</span>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
            <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
